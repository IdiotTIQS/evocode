server:
  port: 8080
python:
  runtime:
    base-url: http://localhost:8000
evocode:
  jwt:
    # 本地开发密钥。生产务必用环境变量 EVOCODE_JWT_SECRET 覆盖为 >=32 字节随机值。
    secret: ${EVOCODE_JWT_SECRET:local-dev-only-secret-key-change-via-env-min-32-bytes}
    ttl-hours: 24
management:
  endpoints:
    web:
      exposure:
        include: health
spring:
  datasource:
    url: jdbc:h2:file:./data/evocode;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.format_sql: false
    open-in-view: false
