server:
  port: 8080
python:
  runtime:
    base-url: http://localhost:8000
management:
  endpoints:
    web:
      exposure:
        include: health
spring:
  datasource:
    url: jdbc:h2:file:./data/evocode;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.format_sql: false
    open-in-view: false
